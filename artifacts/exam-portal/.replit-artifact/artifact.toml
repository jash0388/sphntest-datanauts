kind = "web"
previewPath = "/"
title = "Exam Portal"
version = "1.0.0"
id = "artifacts/exam-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18926

[services.development]
run = "pnpm --filter @workspace/exam-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam-portal", "run", "build" ]
publicDir = "artifacts/exam-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18926"
BASE_PATH = "/"
